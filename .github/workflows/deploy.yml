# ARPlan Pro — GitHub Pages auto-deploy
# Se ejecuta en cada push a main
# No requiere tokens ni configuración extra

name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # permite ejecutar manualmente desde la UI de GitHub

permissions:
  contents: read
  pages:    write
  id-token: write

# Solo un deploy concurrente, cancela el anterior si hay uno en curso
concurrency:
  group:   "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true   # necesario si usas Git LFS para GLB/DXF grandes

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # sube todo el repositorio

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
